compatibility_date = "2024-11-11"
main = "build/worker/shim.mjs"
name = "multistore"

[build]
command = "cargo install worker-build && worker-build --release"

[vars]
VIRTUAL_HOST_DOMAIN = "s3.local"

# For production, consider storing this in Workers KV or a Secrets binding.
[vars.PROXY_CONFIG]

[[vars.PROXY_CONFIG.buckets]]
allowed_roles = []
anonymous_access = true
backend_type = "s3"
backend_prefix = "harvard-lil/"
name = "harvard-lil"

[vars.PROXY_CONFIG.buckets.backend_options]
bucket_name = "us-west-2.opendata.source.coop"
endpoint = "https://s3.us-west-2.amazonaws.com"
region = "us-west-2"
skip_signature = "true"

[[vars.PROXY_CONFIG.buckets]]
allowed_roles = ["github-actions"]
anonymous_access = false
backend_type = "s3"
backend_prefix = "cholmes/"
name = "cholmes"

[vars.PROXY_CONFIG.buckets.backend_options]
bucket_name = "us-west-2.opendata.source.coop"
endpoint = "https://s3.us-west-2.amazonaws.com"
region = "us-east-1"
skip_signature = "true"

[[vars.PROXY_CONFIG.credentials]]
access_key_id = "AKPROXY00000EXAMPLE"
secret_access_key = "EXAMPLE000000000000"
principal_name = "demo-user"
created_at = "2024-01-15T00:00:00Z"
enabled = true

[[vars.PROXY_CONFIG.credentials.allowed_scopes]]
bucket = "cholmes"
prefixes = []
actions = ["get_object", "head_object", "list_bucket"]

[[vars.PROXY_CONFIG.roles]]
max_session_duration_secs = 3600
name = "GitHub Actions"
role_id = "github-actions"
subject_conditions = ["repo:developmentseed/multistore:*"]
trusted_oidc_issuers = [
  "https://token.actions.githubusercontent.com",
]

[[vars.PROXY_CONFIG.roles.allowed_scopes]]
actions = ["get_object", "head_object", "list_bucket"]
bucket = "cholmes"
prefixes = []

[[vars.PROXY_CONFIG.roles]]
max_session_duration_secs = 3600
name = "Default User Access"
role_id = "default"
subject_conditions = ["*"]
trusted_oidc_issuers = [
  "https://auth.staging.source.coop",
]

[[vars.PROXY_CONFIG.roles.allowed_scopes]]
actions = [
  "get_object",
  "head_object",
  "put_object",
  "delete_object",
  "list_bucket",
  "create_multipart_upload",
  "upload_part",
  "complete_multipart_upload",
  "abort_multipart_upload",
]
bucket = "*"
prefixes = []

[[vars.PROXY_CONFIG.roles]]
max_session_duration_secs = 3600
name = "GitHub Actions (No Access)"
role_id = "github-actions-no-access"
subject_conditions = ["repo:developmentseed/multistore:*"]
trusted_oidc_issuers = [
  "https://token.actions.githubusercontent.com",
]

# Rate limiting bindings
[[ratelimits]]
name = "ANON_RATE_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 200
  period = 10

[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 1_000
  period = 10

# Bandwidth metering
[vars.BANDWIDTH_QUOTAS]
# 2 GB per 5 minutes for the harvard-lil bucket
harvard-lil = { limit_bytes = 2_147_483_648, window_secs = 300 }

[[durable_objects.bindings]]
name = "BANDWIDTH_METER"
class_name = "BandwidthMeter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BandwidthMeter"]

# --- Environment overrides (only the worker name differs) ---

[env.production]
name = "multistore"

[env.staging]
name = "multistore-staging"

[env.preview]
name = "multistore-preview"
