# Source Cooperative public data
[[buckets]]
name = "harvard-lil"
backend_type = "s3"
backend_prefix = "harvard-lil/"
anonymous_access = true
allowed_roles = []

[buckets.backend_options]
bucket_name = "us-west-2.opendata.source.coop" 
region = "us-west-2"
skip_signature = "true"

# Source Cooperative data proxy backend
[[buckets]]
name = "cholmes"
backend_type = "s3"
backend_prefix = "cholmes/"
anonymous_access = false
allowed_roles = ["github-actions"]

[buckets.backend_options]
bucket_name = "us-west-2.opendata.source.coop" 
region = "us-east-1"
skip_signature = "true"

# GitHub Actions OIDC role
[[roles]]
role_id = "github-actions"
name = "GitHub Actions"
trusted_oidc_issuers = ["https://token.actions.githubusercontent.com"]
subject_conditions = ["repo:developmentseed/multistore:*"]
max_session_duration_secs = 3600

[[roles.allowed_scopes]]
bucket = "cholmes"
prefixes = []
actions = ["get_object", "head_object", "list_bucket"]

# Source Cooperative staging OIDC role — read/write access to any bucket
[[roles]]
role_id = "default"
name = "Source Cooperative User"
trusted_oidc_issuers = ["https://auth.staging.source.coop"]
subject_conditions = ["*"]
max_session_duration_secs = 3600

[[roles.allowed_scopes]]
bucket = "*"
prefixes = []
actions = [
  "get_object",
  "head_object",
  "put_object",
  "delete_object",
  "list_bucket",
  "create_multipart_upload",
  "upload_part",
  "complete_multipart_upload",
  "abort_multipart_upload",
]

# Role that can be assumed but has no bucket access
[[roles]]
role_id = "github-actions-no-access"
name = "GitHub Actions (No Access)"
trusted_oidc_issuers = ["https://token.actions.githubusercontent.com"]
subject_conditions = ["repo:alukach/not-this-repo:*"]
max_session_duration_secs = 3600
