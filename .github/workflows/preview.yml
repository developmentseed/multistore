name: Preview Deploy & Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: multistore-proxy-pr-${{ github.event.pull_request.number }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Deploy preview worker
        id: deploy
        run: |
          OUTPUT=$(npx wrangler deploy --cwd examples/cf-workers --name "$WORKER_NAME" --var "OIDC_PROVIDER_ISSUER:${{ vars.OIDC_PROVIDER_ISSUER }}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev')
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Set worker secrets
        run: |
          echo "${{ secrets.SESSION_TOKEN_KEY }}" | npx wrangler secret put SESSION_TOKEN_KEY --cwd examples/cf-workers --name "$WORKER_NAME"
          echo "${{ secrets.OIDC_PROVIDER_KEY }}" | npx wrangler secret put OIDC_PROVIDER_KEY --cwd examples/cf-workers --name "$WORKER_NAME"

      - name: Wait for preview to be live
        run: |
          URL="${{ steps.deploy.outputs.preview_url }}"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null; then
              echo "Preview is live"
              exit 0
            fi
            echo "Attempt $i: waiting for preview..."
            sleep 2
          done
          echo "Preview did not become live in time"
          exit 1

      - name: Find Comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Latest commit deployed to

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Latest commit deployed to ${{ steps.deploy.outputs.preview_url }}

            * Date: `${{ github.event.pull_request.updated_at }}`
            * Commit: ${{ github.sha }}
          edit-mode: replace

  smoke-test:
    name: Smoke Test
    needs: deploy-preview
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Run smoke tests
        run: uvx --with pytest,boto3,requests pytest tests/smoke/ -v

  cleanup-preview:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Delete preview worker
        run: npx wrangler delete --name "multistore-proxy-pr-${{ github.event.pull_request.number }}" --force
