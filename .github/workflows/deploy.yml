name: Deploy & Smoke Test

on:
  workflow_call:
    inputs:
      worker_name:
        description: "Cloudflare Worker name"
        required: true
        type: string
      wrangler_config:
        description: "Wrangler config filename (in examples/cf-workers/)"
        required: true
        type: string
      environment:
        description: "GitHub environment name (preview, staging, production)"
        required: true
        type: string
      oidc_issuer_override:
        description: "Override OIDC_PROVIDER_ISSUER var (for dynamic preview URLs)"
        required: false
        type: string
        default: ""
      smoke_write_bucket:
        description: "Virtual bucket for the multipart write smoke test; empty skips it"
        required: false
        type: string
        default: ""
      set_secrets:
        description: "Whether to set worker secrets after deploy"
        required: false
        type: boolean
        default: true
    outputs:
      deploy_url:
        description: "The deployed worker URL"
        value: ${{ jobs.deploy.outputs.deploy_url }}
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      SESSION_TOKEN_KEY:
        required: true
      OIDC_PROVIDER_KEY:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deploy_url: ${{ steps.url.outputs.deploy_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Deploy worker
        id: deploy
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.oidc_issuer_override }}" ]; then
            EXTRA_ARGS="--var OIDC_PROVIDER_ISSUER:${{ inputs.oidc_issuer_override }}"
          fi
          npx wrangler deploy \
            --cwd examples/cf-workers \
            --config ${{ inputs.wrangler_config }} \
            --name "${{ inputs.worker_name }}" \
            $EXTRA_ARGS

      - name: Get deploy URL
        id: url
        run: |
          URL="https://${{ inputs.worker_name }}.${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev"
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Set worker secrets
        if: inputs.set_secrets
        env:
          SESSION_TOKEN_KEY: ${{ secrets.SESSION_TOKEN_KEY }}
          OIDC_PROVIDER_KEY: ${{ secrets.OIDC_PROVIDER_KEY }}
        run: |
          echo "$SESSION_TOKEN_KEY" | npx wrangler secret put SESSION_TOKEN_KEY --cwd examples/cf-workers --config ${{ inputs.wrangler_config }} --name "${{ inputs.worker_name }}"
          echo "$OIDC_PROVIDER_KEY" | npx wrangler secret put OIDC_PROVIDER_KEY --cwd examples/cf-workers --config ${{ inputs.wrangler_config }} --name "${{ inputs.worker_name }}"

      - name: Wait for deployment to be live
        run: |
          URL="${{ steps.url.outputs.deploy_url }}"
          # A first-ever workers.dev name and freshly-put secrets both
          # propagate eventually: a single 200 can come from a not-yet-
          # consistent edge or a pre-secrets worker version, letting the
          # smoke tests start too early (bare 404s / secretless 500s).
          # OIDC discovery only mounts once OIDC_PROVIDER_KEY is loaded,
          # so it proves the post-secrets version is serving; require
          # consecutive successes so a flapping edge doesn't pass.
          if [ "${{ inputs.set_secrets }}" = "true" ]; then
            PROBE="$URL/.well-known/openid-configuration"
          else
            PROBE="$URL/"
          fi
          ok=0
          for i in $(seq 1 90); do
            if curl -sf -o /dev/null "$PROBE" 2>/dev/null; then
              ok=$((ok+1))
              if [ "$ok" -ge 3 ]; then
                echo "Deployment is live (3 consecutive successful probes)"
                exit 0
              fi
            else
              ok=0
            fi
            echo "Attempt $i: waiting for deployment (consecutive OKs: $ok)..."
            sleep 2
          done
          echo "Deployment did not become live in time (probe: $PROBE)"
          exit 1

  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      DEPLOY_URL: ${{ needs.deploy.outputs.deploy_url }}
      # Object key the federation smoke test GETs from the private
      # bucket (defaults to hello.txt). The full federation path is validated
      # here on both preview (PR) and staging deploys, against the stable
      # staging OIDC issuer — see preview.yml / staging.yml.
      FEDERATION_TEST_KEY: ${{ vars.FEDERATION_TEST_KEY }}
      # Virtual bucket the multipart write smoke test uploads to
      # (TestMultipartUpload). Set per-caller via the `smoke_write_bucket` input
      # (preview.yml passes `smoke-writable`); empty -> the test self-skips.
      SMOKE_WRITE_BUCKET: ${{ inputs.smoke_write_bucket }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run smoke tests
        run: uvx --with pytest,boto3,requests pytest tests/smoke/ -v
