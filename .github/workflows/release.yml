name: Publish to crates.io

on:
  release:
    types: [published]

# All publishable crates in dependency order
env:
  CRATES: >-
    multistore
    multistore-metering
    multistore-path-mapping
    multistore-sts
    multistore-oidc-provider
    multistore-cf-workers

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing OIDC token exchange
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Set crate version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version: $VERSION"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          sed -i 's/\(multistore[a-z-]* = {.*version = "\)[^"]*/\1'"$VERSION"'/' Cargo.toml

      - name: Verify all crates can be packaged
        run: |
          for crate in $CRATES; do
            echo "::group::Dry-run $crate"
            cargo publish -p "$crate" --dry-run
            echo "::endgroup::"
          done

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for crate in $CRATES; do
            echo "::group::Publishing $crate"
            cargo publish -p "$crate"
            echo "::endgroup::"
          done
