name: CI

on:
  push:

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check

  check-wasm:
    name: Cargo Check (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check -p multistore-cf-workers --target wasm32-unknown-unknown

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install cargo-audit
      - run: cargo audit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data

          # Wait for MinIO to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            sleep 1
          done

      - name: Seed MinIO buckets
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/public-data
          mc mb --ignore-existing local/private-uploads
          mc anonymous set download local/public-data
          echo "Hello from s3-proxy!" | mc pipe local/public-data/hello.txt
          echo '{"status":"ok"}' | mc pipe local/public-data/health.json
          echo "Secret payload" | mc pipe local/private-uploads/docs/secret.txt

      - name: Build worker
        working-directory: examples/cf-workers
        run: |
          # worker-build ^0.7 to match worker 0.7.x in Cargo.toml.
          # worker-build 0.8+ requires worker 0.8+ (a separate upgrade).
          cargo install worker-build --version "^0.7"
          worker-build --release

      - name: Write .dev.vars
        run: |
          echo "SESSION_TOKEN_KEY=$(openssl rand -base64 32)" > examples/cf-workers/.dev.vars

      - name: Start wrangler dev
        working-directory: examples/cf-workers
        run: |
          npx wrangler dev --config wrangler.integration.toml --port 8787 &

          # Wait for wrangler to be ready
          for i in $(seq 1 30); do
            if curl -so /dev/null http://localhost:8787/ 2>/dev/null; then
              echo "Wrangler dev is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: wrangler dev failed to start within 60 seconds"
              exit 1
            fi
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run integration tests
        run: uvx --with pytest,boto3,requests pytest tests/integration/ -v

      # End-to-end proof that the flagship consumer of the STS endpoint works
      # unmodified: aws-actions/configure-aws-credentials assumes a role against
      # the proxy (AssumeRoleWithWebIdentity) and validates the result with a
      # signed GetCallerIdentity call — both served by multistore-sts. It exports
      # AWS_ACCESS_KEY_ID / _SECRET_ACCESS_KEY / _SESSION_TOKEN for later steps.
      - name: Assume a role via aws-actions/configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          aws-region: us-east-1
          # Sent verbatim as the STS RoleArn; must match a role_id in
          # wrangler.integration.toml.
          role-to-assume: arn:aws:iam::000000000000:role/github-actions
          # Point the action's STS client (both AssumeRoleWithWebIdentity and its
          # mandatory GetCallerIdentity validation) at the proxy.
          sts-endpoint: http://localhost:8787/.sts

      - name: Write to the proxy with the action's credentials
        run: |
          set -euo pipefail
          # The proxy uses path-style addressing.
          aws configure set default.s3.addressing_style path
          endpoint=http://localhost:8787
          key="action-write/$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.txt"
          echo "written by configure-aws-credentials" > /tmp/action-write.txt

          aws s3 cp /tmp/action-write.txt "s3://private-uploads/$key" --endpoint-url "$endpoint"
          aws s3 cp "s3://private-uploads/$key" /tmp/action-read.txt --endpoint-url "$endpoint"
          diff /tmp/action-write.txt /tmp/action-read.txt
          aws s3 rm "s3://private-uploads/$key" --endpoint-url "$endpoint"
